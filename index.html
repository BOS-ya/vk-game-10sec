<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Попади в 10 секунд!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .timer {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }
        
        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        
        .click-button:active {
            transform: scale(0.95);
        }
        
        .click-button:disabled {
            opacity: 0.5;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .result.win {
            background: #d4edda;
            color: #155724;
        }
        
        .result.lose {
            background: #f8d7da;
            color: #721c24;
        }
        
        .buttons {
            margin-top: 20px;
        }
        
        button {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }
        
        .share-button {
            background: #4C75A3;
        }
        
        .instructions {
            color: #666;
            margin-top: 20px;
            font-size: 16px;
        }
        
        #loading {
            color: #667eea;
            font-size: 18px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Попади в 10 секунд!</h1>
        <div id="loading">Загрузка...</div>
        <div class="timer" id="timer" style="display:none;">0.00</div>
        <button class="click-button" id="clickButton" style="display:none;">ЖМИ!</button>
        <div class="result" id="result"></div>
        <div class="buttons">
            <button id="resetButton" style="display: none;">🔄 Заново</button>
            <button class="share-button" id="shareButton" style="display: none;"> Поделиться</button>
        </div>
        <div class="instructions">
            Нажмите на кнопку ровно в <strong>10.00 секунд</strong>!
        </div>
    </div>

    <script>
        // Показываем, что игра загрузилась
        window.addEventListener('load', function() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('timer').style.display = 'block';
            document.getElementById('clickButton').style.display = 'block';
            startGame();
        });
        
        let startTime = null;
        let timerInterval = null;
        let isGameActive = false;
        let lastResult = null;
        let lastDisplayedTime = '0.00';
        
        const timerDisplay = document.getElementById('timer');
        const clickButton = document.getElementById('clickButton');
        const resultDisplay = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const shareButton = document.getElementById('shareButton');
        
        function startGame() {
            startTime = Date.now();
            isGameActive = true;
            lastResult = null;
            lastDisplayedTime = '0.00';
            clickButton.disabled = false;
            resultDisplay.className = 'result';
            resultDisplay.textContent = '';
            resetButton.style.display = 'none';
            shareButton.style.display = 'none';
            timerInterval = setInterval(updateTimer, 10);
        }
        
        function updateTimer() {
            if (!isGameActive) return;
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            lastDisplayedTime = elapsedTime.toFixed(2);
            timerDisplay.textContent = lastDisplayedTime;
            if (elapsedTime >= 11.01) {
                endGame(false, parseFloat(lastDisplayedTime));
            }
        }
        
        clickButton.addEventListener('click', function() {
            if (!isGameActive) return;
            const clickTime = parseFloat(lastDisplayedTime);
            if (clickTime >= 9.99 && clickTime <= 10.01) {
                endGame(true, clickTime);
            } else {
                endGame(false, clickTime);
            }
        });
        
        function endGame(won, time) {
            isGameActive = false;
            lastResult = { won, time };
            clearInterval(timerInterval);
            clickButton.disabled = true;
            if (won) {
                resultDisplay.className = 'result win';
                resultDisplay.textContent = ' ПОБЕДА!';
            } else {
                resultDisplay.className = 'result lose';
                resultDisplay.textContent = 'Время: ' + time.toFixed(2) + ' сек';
            }
            resetButton.style.display = 'inline-block';
            shareButton.style.display = 'inline-block';
        }
        
        resetButton.addEventListener('click', function() {
            timerDisplay.textContent = '0.00';
            startGame();
        });
        
        shareButton.addEventListener('click', function() {
            if (!lastResult) return;
            const message = lastResult.won 
                ? '🎉 Я попал в 10.00 секунд!'
                : 'Моё время: ' + lastResult.time.toFixed(2) + ' сек';
            const url = 'https://vk.com/share.php?title=' + encodeURIComponent(message);
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
