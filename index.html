<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    
    <title>Игра: Попади в 10 секунд!</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        :root {
            --vh: 1vh;
        }
        
        body {
            font-family: 'FuturisXC', sans-serif;
            background: linear-gradient(135deg,#FEFEFE 0%, #009BDE 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            padding: 20px;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            max-height: calc(var(--vh, 1vh) * 100 - 40px);
            overflow-y: auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .timer {
            font-size: 64px;
            font-weight: bold;
            color:#009BDE;
            margin: 20px 0;
            font-family: 'FuturisXC', monospace;
        }
        
        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            max-width: 300px;
        }
        
        .click-button:active {
            transform: scale(0.98);
        }
        
        .click-button:disabled {
            opacity: 0.5;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .result.win {
            background: #4a4a4a;
            color: #f30505;
        }
        
        .result.lose {
            background: #009BDE;
            color: #4a4a4a;
        }
        
        .reset-button, .share-button {
            background:#4C75A3;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .share-button {
            background: #4C75A3;
            margin-left: 10px;
        }
        
        .instructions {
            color: #4a4a4a;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        @media (max-width: 480px) {
            .timer {
                font-size: 48px;
            }
            
            .click-button {
                font-size: 20px;
                padding: 18px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Попади в 10 секунд!</h1>
        
        <div class="timer" id="timer">0.00</div>
        
        <button class="click-button" id="clickButton">ЖМИ</button>
        
        <div class="result" id="result"></div>
        
        <div style="margin-top: 15px;">
            <button class="reset-button" id="resetButton" style="display: none;">
                Начать заново
            </button>
            <button class="share-button" id="shareButton" style="display: none;">
                📤 Поделиться
            </button>
        </div>
        
        <div class="instructions">
            Нажмите на кнопку ровно в <strong>10.00 секунд</strong>!
        </div>
    </div>

    <script>
        // Проверка iOS
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }
        
        // Исправление для iOS Safari
        function setVHVariable() {
            let vh = window.innerHeight * 0.001;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        setVHVariable();
        window.addEventListener('resize', setVHVariable);
        window.addEventListener('orientationchange', setVHVariable);
        
        // Инициализация VK Bridge
        let vkBridgeInitialized = false;
        
        async function initVKBridge() {
            if (isIOS()) {
                console.log('iOS detected - using localStorage');
                vkBridgeInitialized = false;
                return;
            }
            
            try {
                await vkBridge.send('VKWebAppInit');
                vkBridgeInitialized = true;
            } catch (error) {
                console.error('VK Bridge error:', error);
                vkBridgeInitialized = false;
            }
        }
        
        initVKBridge();
        
        let startTime = null;
        let timerInterval = null;
        let isGameActive = false;
        let lastResult = null;
        
        const timerDisplay = document.getElementById('timer');
        const clickButton = document.getElementById('clickButton');
        const resultDisplay = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const shareButton = document.getElementById('shareButton');
        
        // Универсальный обработчик для iOS
        function addTouchHandler(element, handler) {
            element.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handler(e);
            }, { passive: false });
            
            element.addEventListener('click', function(e) {
                handler(e);
            });
        }
        
        // Сохранение с fallback для iOS
        async function saveResult(time, isWin) {
            if (!vkBridgeInitialized) {
                // localStorage для iOS
                try {
                    localStorage.setItem('last_time', time.toFixed(2));
                    if (isWin) {
                        const best = localStorage.getItem('best_time');
                        if (!best || time < parseFloat(best)) {
                            localStorage.setItem('best_time', time.toFixed(2));
                        }
                    }
                } catch (e) {
                    console.error('Storage error:', e);
                }
                return;
            }
            
            // VK Bridge для остальных
            try {
                await vkBridge.send('VKWebAppStorageSet', {
                    key: 'last_result',
                    value: JSON.stringify({ time: time.toFixed(2), isWin })
                });
            } catch (error) {
                console.error('Save error:', error);
            }
        }
        
        function loadBestTime() {
            if (!vkBridgeInitialized) {
                const best = localStorage.getItem('best_time');
                if (best) {
                    return parseFloat(best);
                }
                return null;
            }
            return null;
        }
        
        function startGame() {
            startTime = Date.now();
            isGameActive = true;
            lastResult = null;
            clickButton.disabled = false;
            resultDisplay.className = 'result';
            resultDisplay.textContent = '';
            resetButton.style.display = 'none';
            shareButton.style.display = 'none';
            
            timerInterval = setInterval(updateTimer, 10);
        }
        
        function updateTimer() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            
            timerDisplay.textContent = elapsedTime.toFixed(2);
            
            if (elapsedTime >= 11.001) {
                endGame(false, elapsedTime);
            }
        }
        
        // Обработчик клика с поддержкой iOS
        addTouchHandler(clickButton, function() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const clickTime = (currentTime - startTime) / 1000;
            
            if (clickTime >= 9.999 && clickTime <= 10.001) {
                endGame(true, clickTime);
            } else {
                endGame(false, clickTime);
            }
        });
        
        async function endGame(won, time) {
            isGameActive = false;
            lastResult = { won, time };
            clearInterval(timerInterval);
            clickButton.disabled = true;
            
            if (won) {
                resultDisplay.className = 'result win';
                resultDisplay.textContent = '🎉 ПОБЕДА! ';
            } else {
                resultDisplay.className = 'result lose';
                resultDisplay.textContent = `Время: ${time.toFixed(2)} сек`;
            }
            
            resetButton.style.display = 'inline-block';
            shareButton.style.display = 'inline-block';
            
            await saveResult(time, won);
        }
        
        // Обработчики кнопок
        addTouchHandler(resetButton, function() {
            timerDisplay.textContent = '0.000';
            startGame();
        });
        
        addTouchHandler(shareButton, function() {
            if (!lastResult) return;
            
            const message = lastResult.won 
                ? `🎉 Я попал в 10.00 секунд!`
                : `⏱️ Моё время: ${lastResult.time.toFixed(2)} сек`;
            
            const url = `https://vk.com/share.php?title=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        });
        
        // Старт игры
        startGame();
    </script>
</body>
</html>
