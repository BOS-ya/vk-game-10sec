<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Попади в 10 секунд!</title>
    
    <!-- VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <style>
          <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Игра: Попади в 10 секунд!</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        :root {
            --vh: 1vh;
        }
        
        body {
            font-family: 'FuturisXC', sans-serif;
            background: linear-gradient(135deg, #009bdd 0%, #009bdd 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            padding: 20px;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        h1 {
            color: #4a4a4a;
            margin-bottom: 20px;
            font-size: 26px;
            line-height: 1.3;
        }
        
        .timer {
            font-size: 64px;
            font-weight: bold;
            color: #4a4a4a;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }
        
        .click-button {
            background: linear-gradient(135deg, hsl(61, 100%, 43%) 0%, hsl(61, 100%, 43%) 100%);
            color: rgb(0, 0, 0);
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
            max-width: 300px;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }
        
        .click-button:active {
            transform: scale(0.95);
        }
        
        .click-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result.win {
            background: #ffffff;
            color: #ff0000;
        }
        
        .result.lose {
            background: #ffffff;
            color: #000000;
        }
        
        .buttons {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        
        .reset-button, .share-button {
            background: #4a4a4a;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
            flex: 1;
            min-width: 140px;
            max-width: 200px;
        }
        
        .share-button {
            background: #4a4a4a;
        }
        
        .reset-button:active, .share-button:active {
            opacity: 0.8;
        }
        
        .instructions {
            color: #000000;
            margin-top: 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        /* Адаптация для маленьких экранов iPhone */
        @media (max-width: 480px) {
            .timer {
                font-size: 52px;
            }
            
            .click-button {
                font-size: 22px;
                padding: 18px 40px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .result {
                font-size: 18px;
                padding: 15px;
            }
            
            .instructions {
                font-size: 14px;
            }
        }
        
        /* Для очень маленьких экранов */
        @media (max-width: 375px) {
            .timer {
                font-size: 44px;
            }
            
            .click-button {
                font-size: 20px;
                padding: 16px 30px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Попади в 10 секунд!</h1>
        
        <div class="timer" id="timer">0.00</div>
        
        <button class="click-button" id="clickButton">ЖМИ</button>
        
        <div class="result" id="result"></div>
        
        <div class="best-time" id="bestTime"></div>
        
        <button class="share-button" id="shareButton" style="display: none;">
            Поделиться результатом
        </button>
        
        <button class="reset-button" id="resetButton" style="display: none;">
            Начать заново
        </button>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="instructions">
            Нажмите на кнопку ровно в <strong>10.00 секунд</strong>!<br>
            Точность до сотых долей секунды
        </div>
    </div>

    <script>
       let vkBridgeInitialized = false;
        
        async function initVKBridge() {
            try {
                await vkBridge.send('VKWebAppInit');
                vkBridgeInitialized = true;
                console.log('VK Bridge инициализирован');
                
                // Запрос прав на публикацию (опционально)
                try {
                    await vkBridge.send('VKWebAppGetAuthToken', {
                        scope: 'wall'
                    });
                } catch (authError) {
                    console.log('Авторизация не требуется или отклонена');
                }
            } catch (error) {
                console.error('Ошибка инициализации VK Bridge:', error);
                vkBridgeInitialized = false;
            }
        }
        
        // Запуск инициализации
        initVKBridge();
        
        let startTime = null;
        let timerInterval = null;
        let isGameActive = false;
        let lastResult = null;
        
        const timerDisplay = document.getElementById('timer');
        const clickButton = document.getElementById('clickButton');
        const resultDisplay = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const shareButton = document.getElementById('shareButton');
        const bestTimeDisplay = document.getElementById('bestTime');
        const errorMessage = document.getElementById('errorMessage');
        
        // Сохранение результата
        async function saveResult(time, isWin) {
            if (!vkBridgeInitialized) return;
            
            try {
                await vkBridge.send('VKWebAppStorageSet', {
                    key: 'last_result',
                    value: JSON.stringify({
                        time: time.toFixed(2),
                        isWin: isWin,
                        date: new Date().toISOString()
                    })
                });
                
                if (isWin) {
                    const bestTime = await getBestTime();
                    if (!bestTime || time < bestTime) {
                        await vkBridge.send('VKWebAppStorageSet', {
                            key: 'best_time',
                            value: time.toFixed(2)
                        });
                        bestTimeDisplay.textContent = `🏆 Лучший результат: ${time.toFixed(2)} сек`;
                    }
                }
            } catch (error) {
                console.error('Ошибка сохранения:', error);
            }
        }
        
        // Получение лучшего результата
        async function getBestTime() {
            if (!vkBridgeInitialized) return null;
            
            try {
                const result = await vkBridge.send('VKWebAppStorageGet', {
                    keys: ['best_time']
                });
                const bestTime = result.keys.find(k => k.key === 'best_time');
                return bestTime ? parseFloat(bestTime.value) : null;
            } catch (error) {
                return null;
            }
        }
        
        // Загрузка лучшего результата при старте
        async function loadBestTime() {
            const bestTime = await getBestTime();
            if (bestTime) {
                bestTimeDisplay.textContent = `🏆 Лучший результат: ${bestTime.toFixed(2)} сек`;
            }
        }
        
        // Запуск игры
        function startGame() {
            startTime = Date.now();
            isGameActive = true;
            lastResult = null;
            clickButton.disabled = false;
            resultDisplay.className = 'result';
            resultDisplay.textContent = '';
            resetButton.style.display = 'none';
            shareButton.style.display = 'none';
            errorMessage.style.display = 'none';
            
            timerInterval = setInterval(updateTimer, 10);
        }
        
     // Обновление таймера
function updateTimer() {
    if (!isGameActive) return;
    
    const currentTime = Date.now();
    const elapsedTime = (currentTime - startTime) / 1000;
    
    timerDisplay.textContent = elapsedTime.toFixed(2);
    
    // ИЗМЕНЕНО: таймер считает до 11.01 вместо 10.01
    if (elapsedTime >= 11.01) {
        endGame(false, elapsedTime);
    }
}

// Обработка клика 
clickButton.addEventListener('click', function() {
    if (!isGameActive) return;
    
    const currentTime = Date.now();
    const clickTime = (currentTime - startTime) / 1000;
    
    // Цель остаётся 10.00 секунд
    if (clickTime > 9.99 && clickTime < 10.01) {
        endGame(true, clickTime);
    } else {
        endGame(false, clickTime);
    }
});
        
        // Завершение игры
        async function endGame(won, time) {
            isGameActive = false;
            lastResult = { won, time };
            clearInterval(timerInterval);
            clickButton.disabled = true;
             timerDisplay.textContent = time.toFixed(2);
            if (won) {
                resultDisplay.className = 'result win';
                resultDisplay.textContent = '🎉 ПОБЕДА! 🎉';
            } else {
                resultDisplay.className = 'result lose';
                resultDisplay.textContent = `Время попытки: ${time.toFixed(2)} сек`;
            }
            
            resetButton.style.display = 'inline-block';
            shareButton.style.display = 'inline-block';
            
            // Сохранение результата
            await saveResult(time, won);
        }
        
        // Поделиться результатом - ИСПРАВЛЕННАЯ ВЕРСИЯ
        shareButton.addEventListener('click', async function() {
            if (!lastResult) {
                showError('Нет результата для публикации');
                return;
            }
            
            const message = lastResult.won 
                ? `🎉 Я попал ровно в 10.00 секунд в игре "Попади в 10 секунд"! Попробуй тоже!`
                : `⏱️ Моё время: ${lastResult.time.toFixed(2)} сек в игре "Попади в 10 секунд". Сможешь лучше?`;
            
            // Способ 1: Через VK Bridge (работает внутри ВК)
            if (vkBridgeInitialized) {
                try {
                    await vkBridge.send('VKWebAppShowWallPostBox', {
                        message: message,
                        attachments: '' // можно добавить ссылку на приложение
                    });
                    console.log('Публикация через VK Bridge успешна');
                    return;
                } catch (error) {
                    console.error('Ошибка VK Bridge:', error);
                    // Если не получилось через VK Bridge, пробуем другой способ
                }
            }
            
            // Способ 2: Открытие окна шеринга ВК в новой вкладке
            try {
                const shareUrl = `https://vk.com/share.php?title=${encodeURIComponent(message)}`;
                window.open(shareUrl, '_blank', 'width=600,height=400');
                console.log('Открыто окно шеринга ВК');
            } catch (error) {
                console.error('Ошибка открытия окна шеринга:', error);
                showError('Не удалось поделиться. Попробуйте скопировать текст вручную.');
            }
        });
        
        // Показать сообщение об ошибке
        function showError(text) {
            errorMessage.textContent = text;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }
        
        // Сброс игры
        resetButton.addEventListener('click', function() {
            timerDisplay.textContent = '0.00';
            startGame();
        });
        
        // Загрузка рекорда и старт игры
        loadBestTime();
        startGame();
    </script>
</body>
</html>
