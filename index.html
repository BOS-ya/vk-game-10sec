<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Игра: Попади в 10 секунд!</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .timer {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }
        
        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .click-button:hover {
            transform: scale(1.05);
        }
        
        .click-button:active {
            transform: scale(0.98);
        }
        
        .click-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            min-height: 70px;
        }
        
        .result.win {
            background: #d4edda;
            color: #155724;
        }
        
        .result.lose {
            background: #f8d7da;
            color: #721c24;
        }
        
        .buttons {
            margin-top: 20px;
        }
        
        .reset-button, .share-button {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }
        
        .share-button {
            background: #4C75A3;
        }
        
        .instructions {
            color: #666;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Попади в 10 секунд!</h1>
        
        <div class="timer" id="timer">0.00</div>
        
        <button class="click-button" id="clickButton">ЖМИ!</button>
        
        <div class="result" id="result"></div>
        
        <div class="buttons">
            <button class="reset-button" id="resetButton" style="display: none;">Начать заново</button>
            <button class="share-button" id="shareButton" style="display: none;">📤 Поделиться</button>
        </div>
        
        <div class="instructions">
            Нажмите на кнопку ровно в <strong>10.00 секунд</strong>!<br>
            Точность до сотых долей секунды
        </div>
    </div>

    <script>
        let startTime = null;
        let timerInterval = null;
        let isGameActive = false;
        let lastResult = null;
        
        const timerDisplay = document.getElementById('timer');
        const clickButton = document.getElementById('clickButton');
        const resultDisplay = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const shareButton = document.getElementById('shareButton');
        
        function startGame() {
            startTime = Date.now();
            isGameActive = true;
            lastResult = null;
            clickButton.disabled = false;
            resultDisplay.className = 'result';
            resultDisplay.textContent = '';
            resetButton.style.display = 'none';
            shareButton.style.display = 'none';
            
            timerInterval = setInterval(updateTimer, 10);
        }
        
        function updateTimer() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            
            timerDisplay.textContent = elapsedTime.toFixed(2);
            
            if (elapsedTime >= 11.01) {
                endGame(false, elapsedTime);
            }
        }
        
        clickButton.addEventListener('click', function() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const clickTime = (currentTime - startTime) / 1000;
            
            if (clickTime >= 9.99 && clickTime <= 10.01) {
                endGame(true, clickTime);
            } else {
                endGame(false, clickTime);
            }
        });
        
        function endGame(won, time) {
            isGameActive = false;
            lastResult = { won, time };
            clearInterval(timerInterval);
            clickButton.disabled = true;
            timerDisplay.textContent = time.toFixed(2);
            if (won) {
                resultDisplay.className = 'result win';
                resultDisplay.textContent = '🎉 ПОБЕДА! 🎉';
            } else {
                resultDisplay.className = 'result lose';
                resultDisplay.textContent = `Время попытки: ${time.toFixed(2)} сек`;
            }
            
            resetButton.style.display = 'inline-block';
            shareButton.style.display = 'inline-block';
        }
        
        resetButton.addEventListener('click', function() {
            timerDisplay.textContent = '0.00';
            startGame();
        });
        
        shareButton.addEventListener('click', function() {
            if (!lastResult) return;
            
            const message = lastResult.won 
                ? `🎉 Я попал ровно в 10.00 секунд! Попробуй тоже!`
                : `️ Моё время: ${lastResult.time.toFixed(2)} сек. Сможешь лучше?`;
            
            const url = `https://vk.com/share.php?title=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        });
        
        startGame();
    </script>
</body>
</html>
