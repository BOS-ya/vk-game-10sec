<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Попади в 10 секунд!</title>
    
    <!-- VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <style>
        /* Ваши стили */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FEFEFE 0%, #009BDE 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .timer {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }
        
        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .result.win {
            background: #d4edda;
            color: #155724;
        }
        
        .result.lose {
            background: #f8d7da;
            color: #721c24;
        }
        
        .best-time {
            margin-top: 20px;
            font-size: 18px;
            color: #666;
        }
        
        .share-button {
            background: #4C75A3;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Попади в 10 секунд!</h1>
        
        <div class="timer" id="timer">0.00</div>
        
        <button class="click-button" id="clickButton">КЛИК!</button>
        
        <div class="result" id="result"></div>
        
        <div class="best-time" id="bestTime"></div>
        
        <button class="share-button" id="shareButton" style="display: none;">
            Поделиться результатом
        </button>
        
        <button class="reset-button" id="resetButton" style="display: none;">
            Начать заново
        </button>
    </div>

    <script>
        // Инициализация VK Bridge
        vkBridge.send('VKWebAppInit');
        
        let startTime = null;
        let timerInterval = null;
        let isGameActive = false;
        let lastResult = null;
        
        const timerDisplay = document.getElementById('timer');
        const clickButton = document.getElementById('clickButton');
        const resultDisplay = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const shareButton = document.getElementById('shareButton');
        const bestTimeDisplay = document.getElementById('bestTime');
        
        // Загрузка лучшего результата при старте
        async function loadBestTime() {
            try {
                const bestTime = await getBestTime();
                if (bestTime) {
                    bestTimeDisplay.textContent = `🏆 Лучший результат: ${bestTime.toFixed(2)} сек`;
                }
            } catch (error) {
                console.error('Ошибка загрузки рекорда:', error);
            }
        }
        
        // Сохранение результата
        async function saveResult(time, isWin) {
            try {
                await vkBridge.send('VKWebAppStorageSet', {
                    key: 'last_result',
                    value: JSON.stringify({
                        time: time.toFixed(2),
                        isWin: isWin,
                        date: new Date().toISOString()
                    })
                });
                
                if (isWin) {
                    const bestTime = await getBestTime();
                    if (!bestTime || time < bestTime) {
                        await vkBridge.send('VKWebAppStorageSet', {
                            key: 'best_time',
                            value: time.toFixed(2)
                        });
                        bestTimeDisplay.textContent = `🏆 Лучший результат: ${time.toFixed(2)} сек`;
                    }
                }
            } catch (error) {
                console.error('Ошибка сохранения:', error);
            }
        }
        
        // Получение лучшего результата
        async function getBestTime() {
            try {
                const result = await vkBridge.send('VKWebAppStorageGet', {
                    keys: ['best_time']
                });
                const bestTime = result.keys.find(k => k.key === 'best_time');
                return bestTime ? parseFloat(bestTime.value) : null;
            } catch (error) {
                return null;
            }
        }
        
        // Запуск игры
        function startGame() {
            startTime = Date.now();
            isGameActive = true;
            lastResult = null;
            clickButton.disabled = false;
            resultDisplay.className = 'result';
            resultDisplay.textContent = '';
            resetButton.style.display = 'none';
            shareButton.style.display = 'none';
            
            timerInterval = setInterval(updateTimer, 10);
        }
        
        // Обновление таймера
        function updateTimer() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            
            timerDisplay.textContent = elapsedTime.toFixed(2);
            
            if (elapsedTime >= 10.01) {
                endGame(false, elapsedTime);
            }
        }
        
        // Обработка клика
        clickButton.addEventListener('click', function() {
            if (!isGameActive) return;
            
            const currentTime = Date.now();
            const clickTime = (currentTime - startTime) / 1000;
            
            if (clickTime >= 9.99 && clickTime <= 10.01) {
                endGame(true, clickTime);
            } else {
                endGame(false, clickTime);
            }
        });
        
        // Завершение игры
        async function endGame(won, time) {
            isGameActive = false;
            lastResult = { won, time };
            clearInterval(timerInterval);
            clickButton.disabled = true;
            
            if (won) {
                resultDisplay.className = 'result win';
                resultDisplay.textContent = '🎉 ПОБЕДА! 🎉';
            } else {
                resultDisplay.className = 'result lose';
                resultDisplay.textContent = `Время попытки: ${time.toFixed(2)} сек`;
            }
            
            resetButton.style.display = 'inline-block';
            shareButton.style.display = 'inline-block';
            
            // Сохранение результата
            await saveResult(time, won);
            
            // Показ рекламы (опционально)
            if (!won) {
                await showBannerAd();
            }
        }
        
        // Поделиться результатом
        shareButton.addEventListener('click', async function() {
            if (!lastResult) return;
            
            const message = lastResult.won 
                ? `🎉 Я попал ровно в 10.00 секунд! Попробуй тоже!`
                : `⏱️ Моё время: ${lastResult.time.toFixed(2)} сек. Сможешь лучше?`;
            
            try {
                await vkBridge.send('VKWebAppShowWallPostBox', {
                    message: message
                });
            } catch (error) {
                console.error('Ошибка публикации:', error);
            }
        });
        
        // Сброс игры
        resetButton.addEventListener('click', function() {
            timerDisplay.textContent = '0.00';
            startGame();
        });
        
        // Загрузка рекорда и старт игры
        loadBestTime();
        startGame();
    </script>
</body>
</html>
